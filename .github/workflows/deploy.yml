name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NODE_ENV: production
          # Custom domain (karinaisted.dk) is served from the root, so BASE_PATH must be "/".
          # If you ever switch back to https://<user>.github.io/<repo>/, set BASE_PATH: /karina-isted/
          BASE_PATH: /

      - name: Prepare static output for GitHub Pages
        run: |
          # Use the SPA shell as a fallback for unknown routes (client router takes over)
          if [ -f dist/client/_shell.html ]; then
            cp dist/client/_shell.html dist/client/404.html
            # Ensure / has an index.html; the client router will render the home page on hydration
            if [ ! -f dist/client/index.html ]; then
              cp dist/client/_shell.html dist/client/index.html
            fi
          fi
          # Disable Jekyll so files/folders starting with _ are not filtered out
          touch dist/client/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
